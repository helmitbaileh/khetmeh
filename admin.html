<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>لوحة الإدارة | نظام الختمات</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <!-- SheetJS for Excel export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
      :root {
        --green: #1e6b42;
        --green-dark: #145230;
        --green-mid: #2a8a57;
        --green-soft: #eaf6f0;
        --green-pale: #f5fbf7;
        --gold: #a07820;
        --gold-soft: #fdf5e4;
        --gold-border: rgba(160, 120, 32, 0.22);
        --bg: #f6f6f4;
        --card: #fff;
        --text: #181a18;
        --muted: #787b79;
        --sub: #a3a6a4;
        --border: #e3e5e3;
        --border-lt: #eceeed;
        --danger: #b83232;
        --danger-light: #fdf1f0;
        --shadow-sm: 0 2px 10px rgba(0, 0, 0, 0.07);
        --r: 13px;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Tajawal", sans-serif;
        padding-bottom: 60px;
      }

      /* HEADER */
      header {
        background: linear-gradient(
          155deg,
          var(--green-dark) 0%,
          var(--green) 100%
        );
        padding: 24px 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        position: relative;
        overflow: hidden;
      }
      header::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--gold) 40%,
          #d4a830 60%,
          transparent
        );
      }
      .h-left {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .h-logo {
        height: 44px;
        width: auto;
        border-radius: 9px;
        box-shadow: 0 3px 12px rgba(0, 0, 0, 0.25);
        padding: 2px;
        background: rgba(255, 255, 255, 0.08);
      }
      .h-title {
        font-family: "Amiri", serif;
        font-size: 1.3rem;
        font-weight: 700;
        color: #fff;
      }
      .h-badge {
        background: rgba(160, 120, 32, 0.2);
        border: 1px solid rgba(160, 120, 32, 0.38);
        color: #d4a830;
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 1.3px;
        padding: 4px 11px;
        border-radius: 18px;
        white-space: nowrap;
      }

      /* CONTAINER */
      .container {
        max-width: 960px;
        margin: 0 auto;
        padding: 24px 18px;
      }

      /* CARD */
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        margin-bottom: 22px;
        overflow: hidden;
        box-shadow: var(--shadow-sm);
      }
      .card-hdr {
        padding: 17px 20px 14px;
        border-bottom: 1px solid var(--border-lt);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }
      .card-hdr-l {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .card-lbl {
        font-size: 0.62rem;
        font-weight: 700;
        letter-spacing: 1.4px;
        color: var(--sub);
        text-transform: uppercase;
      }
      .card-title {
        font-family: "Amiri", serif;
        font-size: 1.18rem;
        font-weight: 700;
        color: var(--green);
      }
      .card-body {
        padding: 20px;
      }

      /* STATS */
      .stats-bar {
        display: flex;
        gap: 6px;
        padding: 13px 19px;
        background: var(--green-pale);
        border-bottom: 1px solid var(--border-lt);
        flex-wrap: wrap;
      }
      .stat {
        font-size: 0.78rem;
        color: var(--muted);
        font-weight: 500;
      }
      .stat b {
        color: var(--green-dark);
        font-weight: 700;
      }
      .sep {
        color: var(--border);
      }

      /* ACTIONS ROW */
      .actions-row {
        display: flex;
        gap: 8px;
        padding: 12px 18px;
        border-bottom: 1px solid var(--border-lt);
        flex-wrap: wrap;
      }

      /* GRID */
      .parts-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 1px;
        background: var(--border-lt);
      }
      .pa {
        background: var(--card);
        padding: 12px 11px;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .pa.rs {
        cursor: pointer;
        transition: background 0.12s;
      }
      .pa.rs:hover {
        background: #fff8f3;
      }
      .pa-num {
        font-size: 0.58rem;
        font-weight: 700;
        letter-spacing: 1px;
        color: var(--sub);
      }
      .pa.av .pa-num {
        color: var(--green-mid);
      }
      .pa-name {
        font-family: "Amiri", serif;
        font-size: 0.9rem;
        font-weight: 700;
        color: var(--muted);
        line-height: 1.22;
      }
      .pa.av .pa-name {
        color: var(--green);
      }
      .pa-status {
        font-size: 0.67rem;
        color: var(--green-mid);
        font-weight: 500;
        margin-top: 1px;
      }
      .rsv-chip {
        display: inline-block;
        background: var(--gold-soft);
        border: 1px solid var(--gold-border);
        color: var(--gold);
        font-size: 0.67rem;
        font-weight: 700;
        padding: 2px 7px;
        border-radius: 4px;
        margin-top: 3px;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .rsv-uid {
        font-size: 0.63rem;
        color: var(--muted);
        margin-top: 1px;
        direction: ltr;
        text-align: right;
      }
      .hint-rs {
        font-size: 0.6rem;
        color: var(--danger);
        margin-top: 3px;
        font-weight: 500;
        opacity: 0.75;
      }

      /* FORM */
      .hint {
        font-size: 0.78rem;
        color: var(--muted);
        background: var(--bg);
        padding: 9px 14px;
        border-radius: 8px;
        border: 1px solid var(--border);
        margin-bottom: 16px;
        line-height: 1.6;
      }
      .form-row {
        display: flex;
        gap: 9px;
        flex-wrap: wrap;
      }
      .inp {
        flex: 1;
        min-width: 180px;
        padding: 12px 14px;
        border: 1.5px solid var(--border);
        border-radius: 9px;
        font-size: 0.92rem;
        font-family: "Tajawal", sans-serif;
        font-weight: 500;
        color: var(--text);
        background: var(--bg);
        outline: none;
        transition:
          border-color 0.17s,
          box-shadow 0.17s;
      }
      .inp:focus {
        border-color: var(--green);
        background: #fff;
        box-shadow: 0 0 0 3px rgba(30, 107, 66, 0.09);
      }
      .inp::placeholder {
        color: var(--sub);
      }

      /* BTNS */
      .btn {
        padding: 11px 18px;
        border: none;
        border-radius: 9px;
        font-size: 0.86rem;
        font-family: "Tajawal", sans-serif;
        font-weight: 700;
        cursor: pointer;
        transition:
          opacity 0.12s,
          transform 0.08s;
        white-space: nowrap;
      }
      .btn:active {
        transform: scale(0.97);
      }
      .btn-g {
        background: var(--green);
        color: #fff;
        box-shadow: 0 3px 12px rgba(30, 107, 66, 0.22);
      }
      .btn-g:hover {
        background: var(--green-mid);
      }
      .btn-d {
        background: var(--danger-light);
        color: var(--danger);
        border: 1px solid rgba(184, 50, 50, 0.18);
      }
      .btn-d:hover {
        background: #fde4e4;
      }
      .btn-xl {
        background: var(--green-soft);
        color: var(--green-dark);
        border: 1px solid #b4d9c4;
      }
      .btn-xl:hover {
        background: #d0edde;
      }

      /* LOADER */
      .loader {
        text-align: center;
        padding: 60px 20px;
        color: var(--muted);
      }
      .ring {
        width: 34px;
        height: 34px;
        border: 3px solid var(--border);
        border-top-color: var(--green);
        border-radius: 50%;
        animation: spin 0.75s linear infinite;
        margin: 0 auto 12px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 520px) {
        .form-row {
          flex-direction: column;
        }
        header {
          flex-direction: column;
          align-items: flex-start;
        }
        .h-left {
          flex-direction: row;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="h-left">
        <img
          src="https://i.ibb.co/QjFw6J9Y/image.png"
          alt="احنا النجاح"
          class="h-logo"
          onerror="this.style.display = 'none'"
        />
        <div class="h-title">لوحة تحكم المطور</div>
      </div>
      <div class="h-badge">ADMIN PANEL</div>
    </header>

    <div class="container">
      <!-- Create -->
      <div class="card">
        <div class="card-hdr">
          <div class="card-hdr-l">
            <div class="card-lbl">إنشاء</div>
            <div class="card-title">ختمة جديدة</div>
          </div>
        </div>
        <div class="card-body">
          <div class="hint">
            أدخل اسم الختمة ثم اضغط إنشاء — سيتم إنشاء 30 جزءاً تلقائياً.
          </div>
          <div class="form-row">
            <input
              type="text"
              id="new-name"
              class="inp"
              placeholder="اسم الختمة..."
            />
            <button class="btn btn-g" onclick="createKhatma()">
              إنشاء الختمة
            </button>
          </div>
        </div>
      </div>

      <!-- List -->
      <div id="admin-list">
        <div class="loader">
          <div class="ring"></div>
          <p>جاري التحميل...</p>
        </div>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
      import {
        getFirestore,
        collection,
        addDoc,
        onSnapshot,
        doc,
        updateDoc,
        deleteDoc,
        serverTimestamp,
      } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

      const db = getFirestore(
        initializeApp({
          apiKey: "AIzaSyD9UQN3j1wh1SCLw9YF0NKDpuY4yHozj5w",
          authDomain: "khetmeh-abf9c.firebaseapp.com",
          projectId: "khetmeh-abf9c",
          storageBucket: "khetmeh-abf9c.firebasestorage.app",
          messagingSenderId: "130734585859",
          appId: "1:130734585859:web:ee03faaf80a5d9d57ef636",
        }),
      );

      const JUZS = [
        "الجزء الأول",
        "الجزء الثاني",
        "الجزء الثالث",
        "الجزء الرابع",
        "الجزء الخامس",
        "الجزء السادس",
        "الجزء السابع",
        "الجزء الثامن",
        "الجزء التاسع",
        "الجزء العاشر",
        "الجزء الحادي عشر",
        "الجزء الثاني عشر",
        "الجزء الثالث عشر",
        "الجزء الرابع عشر",
        "الجزء الخامس عشر",
        "الجزء السادس عشر",
        "الجزء السابع عشر",
        "الجزء الثامن عشر",
        "الجزء التاسع عشر",
        "الجزء العشرون",
        "الجزء الحادي والعشرون",
        "الجزء الثاني والعشرون",
        "الجزء الثالث والعشرون",
        "الجزء الرابع والعشرون",
        "الجزء الخامس والعشرون",
        "الجزء السادس والعشرون",
        "الجزء السابع والعشرون",
        "الجزء الثامن والعشرون",
        "الجزء التاسع والعشرون",
        "الجزء الثلاثون",
      ];

      // store all khatmas data for export
      let allKhatmas = [];

      window.createKhatma = async () => {
        const inp = document.getElementById("new-name");
        const name = inp.value.trim();
        if (!name) return alert("الرجاء إدخال اسم الختمة");
        const parts = {};
        for (let i = 1; i <= 30; i++)
          parts[`part_${i}`] = {
            number: i,
            status: "available",
            reservedBy: "",
            universityId: "",
          };
        try {
          await addDoc(collection(db, "khatmas"), {
            name,
            createdAt: serverTimestamp(),
            parts,
          });
          inp.value = "";
        } catch (e) {
          alert("حدث خطأ أثناء الإنشاء");
        }
      };

      onSnapshot(collection(db, "khatmas"), (snap) => {
        const root = document.getElementById("admin-list");
        root.innerHTML = "";
        allKhatmas = [];
        if (snap.empty) {
          root.innerHTML = `<div class="loader"><p>لا توجد ختمات.</p></div>`;
          return;
        }
        let list = [];
        snap.forEach((d) => list.push({ id: d.id, ...d.data() }));
        list.sort(
          (a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0),
        );
        allKhatmas = list;

        list.forEach((km) => {
          const parts = Object.values(km.parts);
          const res = parts.filter((p) => p.status === "reserved").length;
          const av = 30 - res;
          let html = "";
          for (let i = 1; i <= 30; i++) {
            const p = km.parts[`part_${i}`],
              av2 = p.status === "available";
            if (av2) {
              html += `<div class="pa av"><div class="pa-num">جزء ${i}</div><div class="pa-name">${JUZS[i - 1]}</div><div class="pa-status">متاح</div></div>`;
            } else {
              const uid = p.universityId
                ? `<div class="rsv-uid">${p.universityId}</div>`
                : "";
              html += `<div class="pa rs" onclick="resetPart('${km.id}',${i},'${p.reservedBy.replace(/'/g, "\\'")}')">
              <div class="pa-num">جزء ${i}</div><div class="pa-name">${JUZS[i - 1]}</div>
              <div class="rsv-chip">${p.reservedBy}</div>${uid}
              <div class="hint-rs">اضغط لإلغاء الحجز</div>
            </div>`;
            }
          }
          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML = `
          <div class="card-hdr">
            <div class="card-hdr-l">
              <div class="card-lbl">ختمة</div>
              <div class="card-title">${km.name}</div>
            </div>
            <button class="btn btn-d" onclick="delKhatma('${km.id}')">حذف الختمة</button>
          </div>
          <div class="stats-bar">
            <span class="stat"><b>${res}</b> محجوزة</span><span class="sep">|</span>
            <span class="stat"><b>${av}</b> متاحة</span><span class="sep">|</span>
            <span class="stat">من أصل <b>30</b></span>
          </div>
          <div class="actions-row">
            <button class="btn btn-xl" onclick="exportExcel('${km.id}')">تصدير Excel</button>
          </div>
          <div class="parts-grid">${html}</div>`;
          root.appendChild(card);
        });
      });

      window.resetPart = async (kid, num, uname) => {
        if (!confirm(`إلغاء حجز "${uname}" للجزء ${num}؟`)) return;
        await updateDoc(doc(db, "khatmas", kid), {
          [`parts.part_${num}.status`]: "available",
          [`parts.part_${num}.reservedBy`]: "",
          [`parts.part_${num}.universityId`]: "",
        });
      };

      window.delKhatma = async (kid) => {
        if (!confirm("سيتم حذف الختمة وجميع حجوزاتها نهائياً. متأكد؟")) return;
        await deleteDoc(doc(db, "khatmas", kid));
      };

      // ─── Excel Export ───
      window.exportExcel = (kid) => {
        const km = allKhatmas.find((k) => k.id === kid);
        if (!km) {
          alert("لم يتم العثور على بيانات الختمة");
          return;
        }

        // Build rows
        const rows = [];
        // Header row
        rows.push([
          "رقم الجزء",
          "اسم الجزء",
          "الحالة",
          "الاسم",
          "الرقم الجامعي",
        ]);

        for (let i = 1; i <= 30; i++) {
          const p = km.parts[`part_${i}`];
          const isRes = p.status === "reserved";
          rows.push([
            i,
            JUZS[i - 1],
            isRes ? "محجوز" : "متاح",
            isRes ? p.reservedBy : "",
            isRes ? p.universityId || "" : "",
          ]);
        }

        // Summary rows
        const resCount = Object.values(km.parts).filter(
          (p) => p.status === "reserved",
        ).length;
        rows.push([]);
        rows.push([
          "إجمالي المحجوز",
          resCount,
          "إجمالي المتاح",
          30 - resCount,
          "",
        ]);

        const ws = XLSX.utils.aoa_to_sheet(rows);

        // Column widths
        ws["!cols"] = [
          { wch: 12 },
          { wch: 26 },
          { wch: 12 },
          { wch: 20 },
          { wch: 18 },
        ];

        // RTL direction hint (for apps that support it)
        ws["!dir"] = "rtl";

        // Style header row cells bold (basic)
        ["A1", "B1", "C1", "D1", "E1"].forEach((cell) => {
          if (ws[cell])
            ws[cell].s = {
              font: { bold: true },
              fill: { fgColor: { rgb: "D4EDDA" } },
              alignment: { horizontal: "center" },
            };
        });

        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "الختمة");
        XLSX.writeFile(wb, `${km.name}.xlsx`);
      };
    </script>
  </body>
</html>
