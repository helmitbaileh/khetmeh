<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>مشروع الختمات القرآنية</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --green: #1e6b42;
        --green-dark: #145230;
        --green-mid: #2a8a57;
        --green-soft: #eaf6f0;
        --green-pale: #f5fbf7;
        --gold: #a07820;
        --gold-soft: #fdf5e4;
        --gold-border: rgba(160, 120, 32, 0.22);
        --bg: #f6f6f4;
        --card: #ffffff;
        --text: #181a18;
        --muted: #787b79;
        --sub: #a3a6a4;
        --border: #e3e5e3;
        --border-lt: #eceeed;
        --res-bg: #fdfaf3;
        --shadow-sm: 0 2px 10px rgba(0, 0, 0, 0.07);
        --shadow-lg: 0 18px 48px rgba(0, 0, 0, 0.14);
        --r: 13px;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Tajawal", sans-serif;
        min-height: 100vh;
        overflow-x: hidden;
        padding-bottom: 40px;
      }

      /* HEADER */
      header {
        background: linear-gradient(
          155deg,
          var(--green-dark) 0%,
          var(--green) 100%
        );
        padding: 32px 24px 28px;
        text-align: center;
        position: relative;
        overflow: hidden;
      }
      header::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(
            ellipse at 15% 65%,
            rgba(160, 120, 32, 0.16) 0%,
            transparent 55%
          ),
          radial-gradient(
            ellipse at 85% 15%,
            rgba(255, 255, 255, 0.05) 0%,
            transparent 50%
          );
        pointer-events: none;
      }
      header::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--gold) 40%,
          #d4a830 60%,
          transparent
        );
      }
      .h-inner {
        position: relative;
        z-index: 1;
      }
      .h-logo-wrap {
        margin-bottom: 12px;
        display: flex;
        justify-content: center;
      }
      .h-logo {
        height: 54px;
        width: auto;
        border-radius: 11px;
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.28);
        padding: 3px;
        background: rgba(255, 255, 255, 0.09);
      }
      header h1 {
        font-family: "Amiri", serif;
        font-size: 1.8rem;
        font-weight: 700;
        color: #fff;
        margin-bottom: 5px;
        line-height: 1.3;
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.22);
      }
      header p {
        color: rgba(255, 255, 255, 0.55);
        font-size: 0.86rem;
        font-weight: 300;
      }

      /* CONTAINER */
      .container {
        max-width: 680px;
        margin: 0 auto;
        padding: 22px 13px;
      }

      /* CARD */
      .khatma-card {
        background: var(--card);
        border-radius: 17px;
        border: 1px solid var(--border);
        margin-bottom: 20px;
        overflow: hidden;
        box-shadow: var(--shadow-sm);
      }
      .khatma-hdr {
        padding: 16px 19px 13px;
        border-bottom: 1px solid var(--border-lt);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .khatma-name {
        font-family: "Amiri", serif;
        font-size: 1.2rem;
        font-weight: 700;
        color: var(--green);
      }
      .khatma-badge {
        font-size: 0.73rem;
        color: var(--green-mid);
        background: var(--green-soft);
        border: 1px solid #bee0cc;
        padding: 3px 10px;
        border-radius: 20px;
        font-weight: 600;
        white-space: nowrap;
      }
      .khatma-badge b {
        color: var(--green-dark);
      }

      /* GRID */
      .parts-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 1px;
        background: var(--border-lt);
      }
      @media (min-width: 480px) {
        .parts-grid {
          grid-template-columns: repeat(3, 1fr);
        }
      }

      .part-item {
        background: var(--card);
        padding: 13px 12px;
        display: flex;
        flex-direction: column;
        gap: 3px;
        transition: background 0.12s;
      }
      .part-item.av {
        cursor: pointer;
      }
      .part-item.av:hover {
        background: var(--green-pale);
      }
      .part-item.av:active {
        background: var(--green-soft);
      }
      .part-item.rs {
        background: var(--res-bg);
      }

      .p-num {
        font-size: 0.6rem;
        font-weight: 700;
        letter-spacing: 1.1px;
        color: var(--sub);
      }
      .part-item.av .p-num {
        color: var(--green-mid);
      }
      .p-name {
        font-family: "Amiri", serif;
        font-size: 0.97rem;
        font-weight: 700;
        color: var(--text);
        line-height: 1.25;
      }
      .part-item.rs .p-name {
        color: var(--muted);
      }
      .p-surah {
        font-size: 0.69rem;
        color: var(--sub);
      }

      .p-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 6px;
        gap: 5px;
      }
      .cta {
        font-size: 0.66rem;
        font-weight: 700;
        color: var(--green-dark);
        background: var(--green-soft);
        border: 1px solid #b4d9c4;
        padding: 3px 8px;
        border-radius: 5px;
      }
      .rsv-name {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        background: var(--gold-soft);
        border: 1px solid var(--gold-border);
        color: var(--gold);
        font-size: 0.66rem;
        font-weight: 700;
        padding: 3px 8px;
        border-radius: 5px;
        max-width: 95px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--gold);
        flex-shrink: 0;
      }
      .rd {
        font-size: 0.64rem;
        color: var(--muted);
        text-decoration: none;
        border: 1px solid var(--border);
        padding: 2px 7px;
        border-radius: 4px;
        transition: all 0.12s;
        white-space: nowrap;
      }
      .rd:hover {
        border-color: var(--green-mid);
        color: var(--green);
      }

      /* LOADER */
      .loader {
        text-align: center;
        padding: 70px 20px;
      }
      .ring {
        width: 36px;
        height: 36px;
        border: 3px solid var(--border);
        border-top-color: var(--green);
        border-radius: 50%;
        animation: spin 0.75s linear infinite;
        margin: 0 auto 13px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .loader p {
        color: var(--muted);
        font-size: 0.86rem;
      }

      /* OVERLAY */
      .ov {
        position: fixed;
        inset: 0;
        background: rgba(8, 18, 12, 0.38);
        backdrop-filter: blur(5px);
        z-index: 200;
        opacity: 0;
        visibility: hidden;
        transition:
          opacity 0.2s,
          visibility 0.2s;
      }
      .ov.on {
        opacity: 1;
        visibility: visible;
      }
      .sheet {
        position: absolute;
        bottom: -110%;
        left: 0;
        right: 0;
        background: #fff;
        border-radius: 21px 21px 0 0;
        box-shadow: var(--shadow-lg);
        transition: bottom 0.32s cubic-bezier(0.32, 0.72, 0, 1);
        max-height: 92vh;
        overflow-y: auto;
      }
      .ov.on .sheet {
        bottom: 0;
      }
      .handle {
        width: 36px;
        height: 4px;
        background: var(--border);
        border-radius: 4px;
        margin: 12px auto 0;
      }
      .sb {
        padding: 20px 21px 34px;
        text-align: center;
      }

      .s-icon {
        width: 50px;
        height: 50px;
        border-radius: 13px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 14px;
        font-size: 1.35rem;
      }
      .ic-g {
        background: var(--green-soft);
        color: var(--green);
      }
      .ic-go {
        background: var(--gold-soft);
        color: var(--gold);
      }
      .s-ok {
        width: 62px;
        height: 62px;
        border-radius: 50%;
        background: var(--green-soft);
        color: var(--green);
        font-size: 1.75rem;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 16px;
      }

      .s-title {
        font-family: "Amiri", serif;
        font-size: 1.3rem;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 5px;
      }
      .s-sub {
        font-size: 0.84rem;
        color: var(--muted);
        margin-bottom: 20px;
        line-height: 1.65;
      }
      .s-sub strong {
        color: var(--green);
        font-weight: 700;
      }

      .inp {
        width: 100%;
        padding: 13px 14px;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        font-size: 0.95rem;
        font-family: "Tajawal", sans-serif;
        font-weight: 500;
        color: var(--text);
        background: var(--bg);
        outline: none;
        text-align: right;
        transition:
          border-color 0.17s,
          box-shadow 0.17s;
        margin-bottom: 9px;
        display: block;
      }
      .inp::placeholder {
        color: var(--sub);
      }
      .inp:focus {
        border-color: var(--green);
        background: #fff;
        box-shadow: 0 0 0 3px rgba(30, 107, 66, 0.09);
      }

      .cf-box {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 10px;
        margin-bottom: 16px;
        overflow: hidden;
        text-align: right;
      }
      .cf-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 11px 13px;
        border-bottom: 1px solid var(--border-lt);
        gap: 10px;
      }
      .cf-row:last-child {
        border-bottom: none;
      }
      .cf-lbl {
        font-size: 0.76rem;
        color: var(--muted);
        font-weight: 500;
        flex-shrink: 0;
      }
      .cf-val {
        font-size: 0.88rem;
        font-weight: 700;
        color: var(--text);
        word-break: break-all;
      }
      .cf-val.ar {
        font-family: "Amiri", serif;
        font-size: 0.97rem;
      }

      .btn-m {
        width: 100%;
        padding: 13px;
        background: var(--green);
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 0.95rem;
        font-family: "Tajawal", sans-serif;
        font-weight: 700;
        cursor: pointer;
        margin-bottom: 8px;
        box-shadow: 0 4px 14px rgba(30, 107, 66, 0.26);
        transition:
          background 0.12s,
          transform 0.08s;
      }
      .btn-m:hover {
        background: var(--green-mid);
      }
      .btn-m:active {
        transform: scale(0.98);
      }
      .btn-m:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .btn-g {
        width: 100%;
        padding: 10px;
        background: transparent;
        border: none;
        color: var(--muted);
        font-size: 0.86rem;
        font-family: "Tajawal", sans-serif;
        font-weight: 500;
        cursor: pointer;
      }

      /* FOOTER */
      footer {
        margin-top: 32px;
        padding: 16px 16px 26px;
        border-top: 1px solid var(--border-lt);
        text-align: center;
      }
      .f-inner {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        font-size: 0.78rem;
        color: var(--muted);
      }
      .f-brand {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--green);
        font-weight: 700;
        font-size: 0.86rem;
        text-decoration: none;
      }
      .f-brand:hover {
        text-decoration: underline;
      }
      .f-logo {
        height: 24px;
        width: auto;
        border-radius: 5px;
        object-fit: contain;
      }

      .empty {
        text-align: center;
        padding: 70px 20px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <header>
      <div class="h-inner">
        <div class="h-logo-wrap">
          <img
            src="https://i.ibb.co/QjFw6J9Y/image.png"
            alt="احنا النجاح"
            class="h-logo"
            onerror="this.style.display = 'none'"
          />
        </div>
        <h1>الختمات القرآنية</h1>
      </div>
    </header>

    <div class="container" id="root">
      <div class="loader">
        <div class="ring"></div>
        <p>جاري تحميل الختمات...</p>
      </div>
    </div>

    <!-- Sheet 1: بيانات -->
    <div class="ov" id="ov1" onclick="sheetClose(event, 'ov1')">
      <div class="sheet" onclick="event.stopPropagation()">
        <div class="handle"></div>
        <div class="sb">
          <div class="s-icon ic-g">&#x2712;</div>
          <div class="s-title">حجز الجزء</div>
          <p class="s-sub">أنت على وشك حجز <strong id="s1-juz"></strong></p>
          <input
            type="text"
            id="s1-name"
            class="inp"
            placeholder="الاسم"
            autocomplete="name"
          />
          <input
            type="text"
            id="s1-id"
            class="inp"
            placeholder="الرقم الجامعي"
            inputmode="numeric"
            autocomplete="off"
          />
          <button class="btn-m" onclick="toConfirm()">التالي</button>
          <button class="btn-g" onclick="hide('ov1')">إلغاء</button>
        </div>
      </div>
    </div>

    <!-- Sheet 2: تأكيد -->
    <div class="ov" id="ov2" onclick="sheetClose(event, 'ov2')">
      <div class="sheet" onclick="event.stopPropagation()">
        <div class="handle"></div>
        <div class="sb">
          <div class="s-icon ic-go">&#x26A0;</div>
          <div class="s-title">تأكيد الحجز</div>
          <p class="s-sub">يرجى مراجعة بياناتك قبل التأكيد</p>
          <div class="cf-box">
            <div class="cf-row">
              <span class="cf-lbl">الجزء</span
              ><span class="cf-val ar" id="c-juz"></span>
            </div>
            <div class="cf-row">
              <span class="cf-lbl">الاسم</span
              ><span class="cf-val ar" id="c-name"></span>
            </div>
            <div class="cf-row">
              <span class="cf-lbl">الرقم الجامعي</span
              ><span class="cf-val" id="c-id"></span>
            </div>
          </div>
          <button class="btn-m" id="btn-ok" onclick="doBook()">
            تأكيد الحجز
          </button>
          <button class="btn-g" onclick="toForm()">تعديل البيانات</button>
        </div>
      </div>
    </div>

    <!-- Sheet 3: نجاح -->
    <div class="ov" id="ov3" onclick="sheetClose(event, 'ov3')">
      <div class="sheet" onclick="event.stopPropagation()">
        <div class="handle"></div>
        <div class="sb">
          <div class="s-ok">✓</div>
          <div class="s-title">تم الحجز بنجاح</div>
          <p class="s-sub" style="margin-bottom: 24px">
            تقبل الله طاعتكم وجعلها في ميزان حسناتكم،<br />
            ونسأل الله أن يجعله شفيعاً لكم يوم القيامة.
          </p>
          <button class="btn-m" onclick="hide('ov3')">إغلاق</button>
        </div>
      </div>
    </div>

    <footer>
      <div class="f-inner">
        <span>تنفيذ بواسطة</span>
        <a href="#" class="f-brand">
          <img
            src="https://i.ibb.co/QjFw6J9Y/image.png"
            alt="احنا النجاح"
            class="f-logo"
            onerror="this.style.display = 'none'"
          />
          فريق احنا النجاح
        </a>
      </div>
    </footer>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
      import {
        getFirestore,
        collection,
        onSnapshot,
        doc,
        updateDoc,
      } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

      const db = getFirestore(
        initializeApp({
          apiKey: "AIzaSyD9UQN3j1wh1SCLw9YF0NKDpuY4yHozj5w",
          authDomain: "khetmeh-abf9c.firebaseapp.com",
          projectId: "khetmeh-abf9c",
          storageBucket: "khetmeh-abf9c.firebasestorage.app",
          messagingSenderId: "130734585859",
          appId: "1:130734585859:web:ee03faaf80a5d9d57ef636",
        }),
      );

      const JUZS = [
        { n: "الجزء الأول", s: "يبدأ بسورة الفاتحة" },
        { n: "الجزء الثاني", s: "يبدأ بسورة البقرة (186)" },
        { n: "الجزء الثالث", s: "يبدأ بسورة البقرة (253)" },
        { n: "الجزء الرابع", s: "يبدأ بسورة آل عمران (92)" },
        { n: "الجزء الخامس", s: "يبدأ بسورة النساء (24)" },
        { n: "الجزء السادس", s: "يبدأ بسورة النساء (148)" },
        { n: "الجزء السابع", s: "يبدأ بسورة المائدة (82)" },
        { n: "الجزء الثامن", s: "يبدأ بسورة الأنعام (111)" },
        { n: "الجزء التاسع", s: "يبدأ بسورة الأعراف (88)" },
        { n: "الجزء العاشر", s: "يبدأ بسورة الأنفال (40)" },
        { n: "الجزء الحادي عشر", s: "يبدأ بسورة التوبة (93)" },
        { n: "الجزء الثاني عشر", s: "يبدأ بسورة هود (6)" },
        { n: "الجزء الثالث عشر", s: "يبدأ بسورة يوسف (53)" },
        { n: "الجزء الرابع عشر", s: "يبدأ بسورة الحجر" },
        { n: "الجزء الخامس عشر", s: "يبدأ بسورة الإسراء" },
        { n: "الجزء السادس عشر", s: "يبدأ بسورة الكهف (75)" },
        { n: "الجزء السابع عشر", s: "يبدأ بسورة الأنبياء" },
        { n: "الجزء الثامن عشر", s: "يبدأ بسورة المؤمنون" },
        { n: "الجزء التاسع عشر", s: "يبدأ بسورة الفرقان (21)" },
        { n: "الجزء العشرون", s: "يبدأ بسورة النمل (56)" },
        { n: "الجزء الحادي والعشرون", s: "يبدأ بسورة العنكبوت (46)" },
        { n: "الجزء الثاني والعشرون", s: "يبدأ بسورة الأحزاب (31)" },
        { n: "الجزء الثالث والعشرون", s: "يبدأ بسورة يس (28)" },
        { n: "الجزء الرابع والعشرون", s: "يبدأ بسورة الزمر (32)" },
        { n: "الجزء الخامس والعشرون", s: "يبدأ بسورة فصلت (47)" },
        { n: "الجزء السادس والعشرون", s: "يبدأ بسورة الأحقاف" },
        { n: "الجزء السابع والعشرون", s: "يبدأ بسورة الذاريات (31)" },
        { n: "الجزء الثامن والعشرون", s: "يبدأ بسورة المجادلة" },
        { n: "الجزء التاسع والعشرون", s: "يبدأ بسورة الملك" },
        { n: "الجزء الثلاثون", s: "يبدأ بسورة النبأ" },
      ];

      // ── state (survives sheet transitions) ──
      let KID = null,
        PNUM = null;

      onSnapshot(collection(db, "khatmas"), (snap) => {
        const root = document.getElementById("root");
        root.innerHTML = "";
        if (snap.empty) {
          root.innerHTML = `<div class="empty"><p>لا توجد ختمات متاحة حالياً</p></div>`;
          return;
        }
        let list = [];
        snap.forEach((d) => list.push({ id: d.id, ...d.data() }));
        list.sort(
          (a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0),
        );
        list.forEach((km) => {
          const res = Object.values(km.parts).filter(
            (p) => p.status === "reserved",
          ).length;
          let html = "";
          for (let i = 1; i <= 30; i++) {
            const p = km.parts[`part_${i}`],
              j = JUZS[i - 1],
              link = `https://quran.com/ar/juz/${i}`,
              av = p.status === "available";
            if (av) {
              html += `<div class="part-item av" onclick="openSheet('${km.id}',${i},'${j.n.replace(/'/g, "\\'")}')">
              <div class="p-num">جزء ${i}</div><div class="p-name">${j.n}</div><div class="p-surah">${j.s}</div>
              <div class="p-row"><span class="cta">احجز</span><a href="${link}" target="_blank" onclick="event.stopPropagation()" class="rd">قراءة</a></div>
            </div>`;
            } else {
              html += `<div class="part-item rs">
              <div class="p-num">جزء ${i}</div><div class="p-name">${j.n}</div><div class="p-surah">${j.s}</div>
              <div class="p-row"><span class="rsv-name"><span class="dot"></span>${p.reservedBy}</span><a href="${link}" target="_blank" class="rd">قراءة</a></div>
            </div>`;
            }
          }
          const card = document.createElement("div");
          card.className = "khatma-card";
          card.innerHTML = `<div class="khatma-hdr"><div class="khatma-name">${km.name}</div><div class="khatma-badge"><b>${res}</b> / 30 محجوز</div></div><div class="parts-grid">${html}</div>`;
          root.appendChild(card);
        });
      });

      window.openSheet = (id, num, name) => {
        KID = id;
        PNUM = num;
        document.getElementById("s1-juz").textContent = name;
        document.getElementById("s1-name").value = "";
        document.getElementById("s1-id").value = "";
        show("ov1");
        setTimeout(() => document.getElementById("s1-name").focus(), 340);
      };

      window.toConfirm = () => {
        const name = document.getElementById("s1-name").value.trim();
        const uid = document.getElementById("s1-id").value.trim();
        if (!name) return alert("الرجاء كتابة الاسم");
        if (!uid) return alert("الرجاء كتابة الرقم الجامعي");
        document.getElementById("c-juz").textContent =
          document.getElementById("s1-juz").textContent;
        document.getElementById("c-name").textContent = name;
        document.getElementById("c-id").textContent = uid;
        hide("ov1");
        setTimeout(() => show("ov2"), 270);
      };

      window.toForm = () => {
        hide("ov2");
        setTimeout(() => show("ov1"), 270);
      };

      window.doBook = async () => {
        // read values from the still-mounted inputs
        const name = document.getElementById("s1-name").value.trim();
        const uid = document.getElementById("s1-id").value.trim();
        if (!name || !uid || !KID || !PNUM)
          return alert("بيانات ناقصة، يرجى المحاولة مرة أخرى.");
        const btn = document.getElementById("btn-ok");
        btn.textContent = "جاري الحجز...";
        btn.disabled = true;
        try {
          await updateDoc(doc(db, "khatmas", KID), {
            [`parts.part_${PNUM}.status`]: "reserved",
            [`parts.part_${PNUM}.reservedBy`]: name,
            [`parts.part_${PNUM}.universityId`]: uid,
          });
          hide("ov2");
          KID = null;
          PNUM = null;
          setTimeout(() => show("ov3"), 270);
        } catch (e) {
          console.error(e);
          alert("حدث خطأ في الاتصال. تأكد من اتصالك بالإنترنت وحاول مجدداً.");
        } finally {
          btn.textContent = "تأكيد الحجز";
          btn.disabled = false;
        }
      };

      function show(id) {
        document.getElementById(id).classList.add("on");
      }
      function hide(id) {
        document.getElementById(id).classList.remove("on");
      }
      window.hide = hide;
      window.sheetClose = (e, id) => {
        if (e.target.id === id) hide(id);
      };
    </script>
  </body>
</html>
